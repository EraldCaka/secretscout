name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      ZIG_GLOBAL_CACHE_DIR: .zig-global-cache
      ZIG_LOCAL_CACHE_DIR: zig-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Run tests
        run: zig build test

      - name: Build binary
        run: zig build
